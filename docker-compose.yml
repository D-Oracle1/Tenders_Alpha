version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tgm_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tgm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tgm_password}
      POSTGRES_DB: ${POSTGRES_DB:-tenders_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tgm_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tgm_app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-tgm_user}:${POSTGRES_PASSWORD:-tgm_password}@db:5432/${POSTGRES_DB:-tenders_db}
      - JWT_SECRET=${JWT_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - UPLOAD_PROVIDER=${UPLOAD_PROVIDER:-local}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./public/uploads:/app/public/uploads
    restart: unless-stopped

volumes:
  postgres_data:
